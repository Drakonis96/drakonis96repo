name: Rebuild combined source

# Re-fetches each app's own source JSON and rebuilds the combined apps.json.
# Each app repo updates its own JSON instantly on release; this job picks those
# changes up and republishes the merged source via GitHub Pages.

on:
  workflow_dispatch:          # manual "Run workflow" button — sync on demand

permissions:
  contents: write

concurrency:
  group: rebuild
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild apps.json from upstream app sources
        run: python3 build.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain apps.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps.json
            git commit -m "Sync combined apps.json from app sources"
            git push
          else
            echo "Already up to date."
          fi
